<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta
      name="description"
      content="A preferred platform for hot news, in-depth analysis and industry trends"
    />
    <title>Categories</title>

    <link rel="stylesheet" href="../public/style/inpublic.css" />
  </head>
  <body>
    <header class="header">
      <div class="header-content">
        <a href="#" class="back-button-header" id="smartBackButton">
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M19 12H5M12 19L5 12L12 5"
              stroke="var(--color2)"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
          <span>Back</span>
        </a>

        <button class="sidebar-toggle" id="sidebarToggle">
          <div class="pulse-ring"></div>
          <img src="../public/images/category.svg" alt="" />
        </button>
      </div>
    </header>

    <div class="ads">
      <div id="div-gpt-ad-category1"></div>
    </div>

    <main class="page-content">
      <div class="category-page-content">
        <div class="category-grid"></div>

        <div class="current-category-articles dsn" id="currentCategoryArticles">
          <div class="articles-container" id="categoryArticlesContainer">
            <div class="home_article-item"></div>
            <div class="home_article-item"></div>

            <div class="ads">
              <div id="div-gpt-ad-category2"></div>
            </div>

            <div class="home_article-item"></div>
            <div class="home_article-item"></div>

            <div class="home_article-item"></div>
            <div class="home_article-item"></div>
            <div class="home_article-item"></div>
            <div class="home_article-item"></div>
          </div>
        </div>
      </div>
    </main>

    <footer class="footer">
      <div class="footer-content">
        <div class="footer-links">
          <a href="about.html">About Us</a>
          <a href="privacy.html">Privacy Policy</a>
        </div>
        <div class="footer-copyright">
          Copyright © 2026 info.turbinate.fun. All rights reserved.
        </div>
      </div>
    </footer>

    <div class="sidebar-menu" id="sidebarMenu">
      <div class="sidebar-content">
        <div class="sidebar-header">
          <h3>Menu</h3>
          <button class="sidebar-close" id="sidebarClose">
            <svg
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M18 6L6 18M6 6L18 18"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </button>
        </div>
        <div class="sidebar-items">
          <a href="../index.html" class="sidebar-item" data-page="home">
            <span>Home</span>
          </a>

          <div class="sidebar-category"></div>
        </div>
      </div>
    </div>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <a
      class="back-home-btn"
      href="../index.html"
      title="Back"
      aria-label="Back to Home"
    >
      <img src="../public/images/home.svg" alt="" />
    </a>

    <script type="module" src="../public/js/inpublic.js"></script>
    <script type="module" src="../public/js/category.js"></script>
    <script type="module">
      import { ad_code_identifier } from "../ads.js";

      if (ad_code_identifier.cate == "adx" && ad_code_identifier.status == 1) {
        console.log("✅ cate is 'adx', loading categorygg.js...");

        const script = document.createElement("script");
        script.type = "module";
        script.src = "../categorygg.js";
        document.body.appendChild(script);
      } else {
        const script = document.createElement("script");
        script.type = "module";
        script.src = "../categorygg_ads.js";
        document.body.appendChild(script);
      }
    </script>
  </body>
</html>
