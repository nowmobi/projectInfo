<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta
      name="description"
      content="A preferred platform for hot news, in-depth analysis and industry trends"
    />
    <title>Article Detail</title>
    <link rel="stylesheet" href="public/style/inpublic.css" />
  </head>
  <body>
    <!-- <div class="ads interstitial-ad">
      <div id="div-gpt-ad-interstitial"></div>
    </div> -->
    <header class="header">
      <div class="header-content">
        <a href="#" class="back-button-header" id="smartBackButton">
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M19 12H5M12 19L5 12L12 5"
              stroke="var(--color2)"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
          <span>Back</span>
        </a>

        <button class="sidebar-toggle" id="sidebarToggle">
          <img src="public/images/category.svg" alt="" />
        </button>
      </div>
    </header>

    <div class="ads">
      <div id="div-gpt-ad-detail1"></div>
    </div>

    <main class="page-content">
      <div class="detail-page-content">
        <div class="article-detail">
          <div class="article-header">
            <h1 class="article-detail-title" id="articleTitle">Loading...</h1>
            <div class="article-detail-meta">
              <div class="article-meta-top">
                <span id="articleAuthor">-</span>
                <span id="articleTime">-</span>
              </div>
              <div class="article-meta-bottom">
                <span id="articleSource">-</span>
              </div>
            </div>
          </div>

          <div class="article-detail-content" id="articleContent">
            <div class="loading">
              <div class="loading-spinner"></div>
            </div>
            <div class="article-item"></div>

            <div class="ads">
              <div id="div-gpt-ad-detail2"></div>
            </div>
            <div class="article-item"></div>
            <div class="ads">
              <div id="div-gpt-ad-detail3"></div>
            </div>
            <div class="article-item"></div>
            <div class="ads">
              <div id="div-gpt-ad-detail4"></div>
            </div>
            <div class="article-item"></div>
            <div class="ads">
              <div id="div-gpt-ad-detail5"></div>
            </div>
            <div class="article-item"></div>
          </div>

          <div class="quick-recommended-section">
            <h3 class="recommended-title">You May Also Like</h3>
            <div class="quick-recommended-list" id="quickRecommendedList"></div>
          </div>

          <div class="recommended-section">
            <h3 class="recommended-title">Hot Articles</h3>
            <div class="recommended-articles" id="recommendedArticles"></div>
          </div>
        </div>
      </div>
    </main>

    <footer class="footer">
      <div class="footer-content">
        <div class="footer-links">
          <a href="pages/about.html">About Us</a>
          <a href="pages/privacy.html">Privacy Policy</a>
        </div>
        <div class="footer-copyright">
          Copyright © 2026 read.bellwether.cloud. All rights reserved.
        </div>
      </div>

      <!-- <div class="ads adunit-anchor">
        <div id="div-gpt-ad-detail-anchor"></div>
      </div> -->
    </footer>

    <a
      class="back-home-btn"
      href="index.html?fromDetail=true"
      title="Back to Home"
      aria-label="Back to Home"
    >
      <img src="public/images/home.svg" alt="" />
    </a>

    <div class="sidebar-menu" id="sidebarMenu">
      <div class="sidebar-content">
        <div class="sidebar-header">
          <h3>Menu</h3>
          <button class="sidebar-close" id="sidebarClose">
            <svg
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M18 6L6 18M6 6L18 18"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </button>
        </div>
        <div class="sidebar-items">
          <a
            href="index.html?fromDetail=true"
            class="sidebar-item"
            data-page="home"
          >
            <span>Home</span>
          </a>

          <div class="sidebar-category"></div>
        </div>
      </div>
    </div>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <script type="module" src="public/js/inpublic.js"></script>
    <script type="module" src="public/js/sec.js"></script>
    <script type="module">
      import { ad_code_identifier } from "./ads.js";

      if (ad_code_identifier.cate == "adx" && ad_code_identifier.status == 1) {
        const script = document.createElement("script");
        script.type = "module";
        script.src = "./detailgg.js";
        document.body.appendChild(script);
      } else {
        const script = document.createElement("script");
        script.type = "module";
        script.src = "./detailgg_ads.js";
        document.body.appendChild(script);
      }
    </script>
  </body>
</html>
