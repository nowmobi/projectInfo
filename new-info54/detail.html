<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <title>Detail</title>
    <link rel="stylesheet" href="public/style/inpublic.css" />
    
  </head>
  <body>
  <header class="header">
      <div class="header-content">
        <a href="#" class="back-header" id="smartBackButton">
          <img src="public/images/back.png" alt="back" />
        </a>

        <div class="logo">
          <p>necrosia.cloud</p>
        </div>

        <button class="sidebar-toggle" id="sidebarToggle">
          <img src="public/images/category.png" alt="Category" />
        </button>
      </div>
    </header>
    <div class="ads">
      <div id="div-gpt-ad-detail1"></div>
    </div>
    <main>
      <div class="detail">
        <div class="detail-header">
          <h1 class="detail-title" id="articleTitle">Loading...</h1>

          <div class="detail-meta">
            <span id="articleType">-</span>
            <span id="articleTime">-</span>
          </div>
          <div style="display:flex; justify-content: center; margin-top: 10px;">
           <span id="articleSource">-</span>
           </div>
        </div>

        <div class="detail-content" id="articleContent">
          <div class="loading">
            <div class="loading-spinner"></div>
          </div>
          <div class="detail-item"></div>
          <div class="ads">
            <div id="div-gpt-ad-detail2"></div>
          </div>
          <div class="detail-item"></div>
          <div class="ads">
            <div id="div-gpt-ad-detail3"></div>
          </div>
          <div class="detail-item"></div>
          <div class="ads">
            <div id="div-gpt-ad-detail4"></div>
          </div>
          <div class="detail-item"></div>
          <div class="ads">
            <div id="div-gpt-ad-detail5"></div>
          </div>
          <div class="detail-item"></div>
        </div>

        <div class="recommended">
          <div class="category-section">
            <div class="section-header">
              <h2 class="section-title">Hot</h2>
            </div>
            <div
              class="section-articles"
              id="recommendedArticles"
            ></div>
          </div>
        </div>
      </div>
    </main>

    <button
      class="top-btn"
      id="backToTopBtn"
      title="Back to Top"
      aria-label="Back to Top"
    >
      <img src="public/images/top.png" alt="Back to Top" />
    </button>

    <a
      class="home-btn"
      href="index.html?fromDetail=true"
      title="Back to Home"
      aria-label="Back to Home"
    >
      <img src="public/images/home.png" alt="Back to Home" />
    </a>

    <div class="sidebar-menu" id="sidebarMenu"></div>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <footer class="footer">
      <div class="footer-content">
        <div class="footer-links">
          <a href="pages/about.html">About Us</a>
          <a href="pages/privacy.html">Privacy Policy</a>
        </div>
        <div class="footer-copyright">
          Copyright © 2026 necrosia.cloud. All rights reserved.
        </div>
      </div>
    </footer>
    
<script src="public/js/BaseURL.js"></script>
<script src="public/js/inpublic.js"></script>
<script src="public/js/detail.js"></script>
<script type="module">
  import { ad_code_identifier } from "./ads.js";

  if (ad_code_identifier.cate == "adx" && ad_code_identifier.status == 1) {

    const script = document.createElement("script");
    script.type = "module";
    script.src = "./detailgg.js";
    document.body.appendChild(script);
  } else {
    const script = document.createElement("script");
    script.type = "module";
    script.src = "./detailgg_ads.js";
    document.body.appendChild(script);
  }
</script>

  </body>
</html>
