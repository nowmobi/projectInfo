<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <title>Categories</title>
    <link rel="stylesheet" href="../public/style/inpublic.css" />
  </head>
  <body>
    <header class="header">
      <div class="header-content">
        <a href="#" class="back-header" id="smartBackButton">
          <img src="../public/images/back.png" alt="back" />
        </a>

        <div class="logo">
          <p>necrosia.cloud</p>
        </div>

        <button class="sidebar-toggle" id="sidebarToggle">
          <img src="../public/images/category.png" alt="Category" />
        </button>
      </div>
    </header>
        <div class="ads">
      <div id="div-gpt-ad-category1"></div>
    </div>
    <main style="padding: 0 15px">
      <div class="cat-grid"></div>

      <div
        class="current-articles"
        id="currentCategoryArticles"
        style="display: none"
      >
        <div class="category-section section--list">
          <div
            class="section-header"
            id="categoryHeader"
            style="display: none"
          >
            <h2 class="section-title" id="categoryTitle"></h2>
          </div>
          <div
            class="section-articles"
            id="categoryArticlesContainer"
          ></div>
        </div>
      </div>
    </main>

    <div class="sidebar-menu" id="sidebarMenu"></div>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <button
      class="top-btn"
      id="backToTopBtn"
      title="Back to Top"
      aria-label="Back to Top"
    >
      <img src="../public/images/top.png" alt="Back to Top" />
    </button>

    <a
      class="home-btn"
      href="../index.html"
      title="Back"
      aria-label="Back to Home"
    >
      <img src="../public/images/home.png" alt="Back to Home" />
    </a>

    <footer class="footer">
      <div class="footer-content">
        <div class="footer-links">
          <a href="about.html">About Us</a>
          <a href="privacy.html">Privacy Policy</a>
        </div>
        <div class="footer-copyright">
          Copyright © 2026 necrosia.cloud. All rights reserved.
        </div>
      </div>
    </footer>

    
<script src="../public/js/BaseURL.js"></script>
<script src="../public/js/inpublic.js"></script>
<script src="../public/js/category.js"></script>
 <script type="module">
      import { ad_code_identifier } from "../ads.js";

      if (ad_code_identifier.cate == "adx" && ad_code_identifier.status == 1) {
        const script = document.createElement("script");
        script.type = "module";
        script.src = "../categorygg.js";
        document.body.appendChild(script);
      } else {
        const script = document.createElement("script");
        script.type = "module";
        script.src = "../categorygg_ads.js";
        document.body.appendChild(script);
      }
    </script>

  </body>
</html>
